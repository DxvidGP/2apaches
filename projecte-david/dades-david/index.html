<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Sistema David v2</title>
    <style>
        body { 
            background: #00000F;
            color: #ffffff;
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            max-width: 900px; 
            text-align: center; 
            background: #00000F;
            padding: 30px; 
            border-radius: 15px;
            border: 1px solid #444;
        }
        h1 { color: #4a90e2; }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        .media-box { 
            background: #333; 
            padding: 10px; 
            border-radius: 10px; 
        }
        img, video { 
            width: 100%; 
            border-radius: 5px; 
            display: block;
        }
        .full-width { grid-column: 1 / span 2; }
        p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Projecte David</h1>
        <p>Sistema balancejat amb volum compartit</p>

        <div class="grid">
            <div class="media-box">
                <img src="imagen1.JPG" alt="Imatge 1">
                <p>imagen1</p>
            </div>

            <div class="media-box">
                <img src="imagen2.JPG" alt="Imatge 2">
                <p>imagen2</p>
            </div>

            <div class="media-box full-width">
                <video controls autoplay loop muted>
                    <source src="video1.mp4" type="video/mp4">
                    El teu navegador no suporta el format de video.
                </video>
                <p>video1</p>
            </div>
        </div>
    </div>

</body>
</html>
